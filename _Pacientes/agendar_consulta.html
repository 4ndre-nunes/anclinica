    <article class="body" style="margin-top: 20vh;">
        <form action="" method="post" data-aos="zoom-in">
                <h3> Agendar Consulta</h3>
                <p>Preencha o formulario com os seus dados e da consulta</p>
            <label for="nome_paciente">Nome do Paciente</label>
            <input type="text" id="nome_paciente" name="nome_paciente">
            <label for="bi_paciente">Nº BI</label>
            <input type="text" id="bi_paciente" name="bi_paciente">
            <label for="nascimento_paciente">Data de Nascimento</label>
            <input type="date" id="nascimento_paciente" name="nascimento_paciente">
            <label for="sexo_paciente">Sexo</label>
            <select name="sexo_paciente" id="sexo_paciente">
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
            </select>
            <label for="altura_paciente">Altura</label>
            <input type="number" id="altura_paciente" name="altura_paciente">
            <label for="peso_paciente">Peso</label>
            <input type="number" id="altura_paciente" name="peso_paciente">
            <label for="especialidade_paciente">Especialidade</label>
            <select name="especialidade_paciente" id="especialidade_paciente">
        <option value="neurologia">Neurologia</option>   <option value="cardiologia">Cardiólogia</option>
        <option value="hepatologia">Hepatologia</option>   <option value="pediatria">Pediatria</option>
        <option value="oftamologia">Oftamologia</option>   <option value="farmacologia">Farmacologia</option>
            </select>
            <label for="medico_paciente">Escolha o Médico</label>
            <select name="medico_paciente" id="medico_paciente">
                <option value="maria">Maria A. Álvaro</option>   <option value="joel">Joel H. Nunes</option>
                <option value="lidia">Lídia A. João</option>   <option value="pediatria">Vincezo M. Cassano</option>
                <option value="marcelina">Marcelina André</option>   <option value="antonio">António H. Zacarias</option>
                    </select>
                    <label for="sintomas_paciente">Descreva os Sintómas</label>
                    <textarea name="sintomas_paciente" id="sintomas_paciente" rows="10"></textarea>

                    <button type="submit">Enviar</button>
        </form>
